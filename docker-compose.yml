services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: shortlink_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/shortlink_db
      SECRET_KEY: change-this-in-production
      BASE_URL: http://localhost:8000
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
    container_name: shortlink_frontend
    ports:
      - "5173:80"
    depends_on:
      - api

  db:
    image: postgres:17
    container_name: shortlink_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shortlink_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shortlink_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
