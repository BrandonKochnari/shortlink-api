name: Run Backend Tests

on:
  push:
    branches:
      - main
      - auth-analytics
      - url-system
  pull_request:
    branches:
      - main
      - auth-analytics
      - url-system

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: sqlite:///./test_shortlink.db

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest