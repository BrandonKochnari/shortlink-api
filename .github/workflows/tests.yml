name: Run Backend Tests

on:
  push:
    branches:
      - main
      - auth-analytics
      - url-system
  pull_request:
    branches:
      - main
      - auth-analytics
      - url-system

jobs:
  test:
    runs-on: ubuntu-latest

    services:
        postgres:
            image: postgres:17
            env:
                POSTGRES_USER: postgres
                POSTGRES_PASSWORD: postgres
                POSTGRES_DB: shortlink_test_db
            ports:
                - 5432:5432
            options: >-
                --health-cmd="pg_isready -U postgres -d shortlink_test_db"
                --health-interval=5s
                --health-timeout=5s
                --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/shortlink_test_db

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest